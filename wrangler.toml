name = "anywhere-module-converter"
main = "src/worker.mjs"
compatibility_date = "2026-06-25"

[vars]
MAX_INPUT_BYTES = "524288"
MAX_SCRIPT_BYTES = "1048576"
MAX_TOTAL_SCRIPT_BYTES = "5242880"
MAX_SCRIPT_FETCHES = "45"
FETCH_CACHE_TTL_SECONDS = "900"
DYNAMIC_CACHE_TTL_SECONDS = "900"
RATE_LIMIT_PER_MINUTE = "60"

# Bind a KV namespace for persistent /r/:hash/:filename rule URLs in production.
[[kv_namespaces]]
binding = "CONVERTER_KV"
id = "8bbd9e280e29403492e7b022e5cca658"
